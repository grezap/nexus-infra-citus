#!/usr/sbin/nft -f
#
# citus-node -- nftables ruleset (Phase 0.P baseline; cold-clone safety net)
#
# Builds on the deb13 baseline (deny-all-inbound, allow SSH +
# node_exporter from VMnet11) and adds the Citus-tier cluster-backplane
# trust.
#
# At clone time the primary NIC is `nic0` (VMnet11 service) and the
# secondary NIC is `nic1` (VMnet10 cluster backplane), set up by
# citus-node-firstboot.sh post-clone.
#
# Kept in sync with terraform/envs/citus/role-overlay-citus-nftables-backplane.tf,
# which pushes its OWN inlined per-role ruleset to each clone + `nft -f` at
# apply time. The runtime overlay is the canonical source of truth -- this
# baked baseline only matters for a clone whose Terraform apply never ran
# (e.g. manual `vmrun start` for ad-hoc testing).
#
# Per memory/feedback_cluster_template_nftables_backplane.md: the
# `iifname "nic1" ip saddr 192.168.10.0/24 accept` rule is what makes the
# intra-cluster mesh work; without it, ping passes but TCP does not. For a
# Citus PG node that mesh is PostgreSQL streaming replication + the
# coordinator<->worker traffic + Patroni<->etcd + VRRP between the keepalived
# pair -- all on the VMnet10 backplane per ADR-0042. The client-facing
# coordinator endpoint (PG 5432) + Patroni REST (8008, for smoke/ops) are also
# opened on the management NIC so the VIP is reachable from the lab network.

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;

        iif "lo" accept
        ct state { established, related } accept
        ct state invalid drop

        # ICMP -- let everything ping (debug-friendly in a lab)
        ip protocol icmp   accept
        ip6 nexthdr icmpv6 accept

        # Management from the lab network only
        iifname "nic0" ip saddr 192.168.70.0/24 tcp dport 22   accept comment "SSH from VMnet11"
        iifname "nic0" ip saddr 192.168.70.0/24 tcp dport 9100 accept comment "node_exporter from VMnet11"
        iifname "nic0" ip saddr 192.168.70.0/24 tcp dport 5432 accept comment "PostgreSQL (coordinator client endpoint / VIP) from VMnet11"
        iifname "nic0" ip saddr 192.168.70.0/24 tcp dport 8008 accept comment "Patroni REST API (smoke/ops) from VMnet11"

        # Phase 0.P -- trust the VMnet10 cluster backplane. Citus intra-cluster
        # gRPC + the etcd raft peer (2380) / client API (2379) all ride VMnet10.
        # Enumerating every component port (etcd 2379/2380, vttablet 16101,
        # vtgate 15991, mysqld 3306, ...) is fragile; the canonical pattern is
        # "the cluster backplane is trusted." nic1 only carries 192.168.10.0/24
        # traffic; the saddr restriction prevents cross-network leak via
        # misconfigured routing.
        iifname "nic1" ip saddr 192.168.10.0/24 accept comment "trusted cluster backplane (VMnet10)"

        counter drop
    }

    chain forward {
        type filter hook forward priority 0; policy drop;
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}
