---
# citus_pg role -- PostgreSQL {{ citus_pg_pg_major }} (Debian trixie native) +
# Citus {{ citus_pg_citus_version }} extension (Citus apt repo) + Patroni
# {{ citus_pg_patroni_version }} (pip venv) + keepalived. EVERYTHING is
# delivered DISABLED; the terraform/envs/citus role-overlays render per-host
# config (patroni.yml per scope, keepalived.conf per group, TLS material) and
# bring up the right component per node.
#
# Why Patroni owns the cluster (not Debian's postgresql.service): Patroni
# does initdb into a Patroni-managed PGDATA, drives leader election + failover
# via the etcd DCS, and rewrites postgresql.conf/pg_hba.conf from patroni.yml.
# Debian auto-creates + auto-starts a `main` cluster on package install; we
# DROP it + mask postgresql.service so the two never fight over port 5432.

# ─── citus system group (firstboot chowns node-identity.env root:citus) ────
- name: Create citus system group
  ansible.builtin.group:
    name: citus
    system: true
    state: present

# ─── PostgreSQL 17 (Debian trixie native apt) ─────────────────────────────
- name: Install PostgreSQL {{ citus_pg_pg_major }} + client + contrib
  ansible.builtin.apt:
    name:
      - "postgresql-{{ citus_pg_pg_major }}"
      - "postgresql-client-{{ citus_pg_pg_major }}"
      - "postgresql-contrib"
    state: present
    update_cache: true

- name: Drop the auto-created `main` cluster (Patroni manages its own PGDATA)
  ansible.builtin.command: "pg_dropcluster --stop {{ citus_pg_pg_major }} main"
  args:
    removes: "/etc/postgresql/{{ citus_pg_pg_major }}/main/postgresql.conf"
  changed_when: true

- name: Mask Debian postgresql units so they never fight Patroni for :5432
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: false
    masked: true
    daemon_reload: true
  loop:
    - postgresql.service
    - "postgresql@{{ citus_pg_pg_major }}-main.service"
  failed_when: false

# ─── Citus extension (community apt repo, packagecloud) ───────────────────
- name: Detect running distro codename
  ansible.builtin.command: lsb_release -cs
  register: citus_pg_codename
  changed_when: false

- name: Probe whether the Citus repo publishes the running codename
  # packagecloud answers the dists/<codename>/Release with a 302 to a signed S3
  # URL, so follow_redirects=all is REQUIRED (a HEAD + no-follow returns 302 and
  # would wrongly trigger the bookworm fallback -- 0.P build transient #1). The
  # final S3 GET returns 200 when the codename is published.
  ansible.builtin.uri:
    url: "https://repos.citusdata.com/community/debian/dists/{{ citus_pg_codename.stdout }}/Release"
    method: GET
    follow_redirects: all
    return_content: false
    status_code: [200, 403, 404]
  register: citus_pg_repo_probe
  failed_when: false

- name: Choose Citus repo codename (fall back to {{ citus_pg_citus_repo_codename_fallback }} if running codename unsupported)
  ansible.builtin.set_fact:
    citus_pg_repo_codename: >-
      {{ citus_pg_codename.stdout
         if (citus_pg_repo_probe.status | default(404)) == 200
         else citus_pg_citus_repo_codename_fallback }}

- name: Install Citus apt signing key
  ansible.builtin.get_url:
    url: "https://repos.citusdata.com/community/gpgkey"
    dest: /usr/share/keyrings/citusdata-archive-keyring.asc
    mode: '0644'

- name: Add Citus community apt source (codename resolved at build)
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/citusdata-archive-keyring.asc] https://repos.citusdata.com/community/debian/ {{ citus_pg_repo_codename }} main"
    filename: citusdata_community
    state: present
    update_cache: true

- name: Install Citus {{ citus_pg_citus_version }} extension for PostgreSQL {{ citus_pg_pg_major }}
  ansible.builtin.apt:
    name: "postgresql-{{ citus_pg_pg_major }}-citus-{{ citus_pg_citus_version }}"
    state: present

- name: Verify citus.so is present
  ansible.builtin.stat:
    path: "/usr/lib/postgresql/{{ citus_pg_pg_major }}/lib/citus.so"
  register: citus_pg_so
  failed_when: not citus_pg_so.stat.exists

# ─── Patroni (pip venv: etcd3 DCS + psycopg2) ─────────────────────────────
- name: Create Patroni pip venv (with upgraded pip/setuptools/wheel)
  ansible.builtin.command: "python3 -m venv --upgrade-deps {{ citus_pg_patroni_venv }}"
  args:
    creates: "{{ citus_pg_patroni_venv }}/bin/python"

- name: Install Patroni {{ citus_pg_patroni_version }} (etcd3 extra) + psycopg2 into the venv
  ansible.builtin.pip:
    name:
      - "patroni[etcd3]=={{ citus_pg_patroni_version }}"
      - "psycopg2-binary"
    virtualenv: "{{ citus_pg_patroni_venv }}"

- name: Verify patroni --version (patronictl has no --version flag)
  ansible.builtin.command: "{{ citus_pg_patroni_venv }}/bin/patroni --version"
  changed_when: false

- name: Verify patronictl binary is executable
  ansible.builtin.stat:
    path: "{{ citus_pg_patroni_venv }}/bin/patronictl"
  register: citus_pg_patronictl
  failed_when: not (citus_pg_patronictl.stat.exists and citus_pg_patronictl.stat.executable)

# ─── keepalived (VRRP VIP per Patroni group) ──────────────────────────────
- name: Install keepalived
  ansible.builtin.apt:
    name: keepalived
    state: present

- name: Mask the stock keepalived.service (nexus-keepalived.service owns it, gated on config)
  ansible.builtin.systemd:
    name: keepalived.service
    enabled: false
    masked: true
    daemon_reload: true
  failed_when: false

# ─── Per-node dirs ────────────────────────────────────────────────────────
- name: Create citus dirs
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ citus_pg_config_dir }}", owner: root, group: citus, mode: '0750' }
    - { path: "{{ citus_pg_config_dir }}/tls", owner: root, group: postgres, mode: '0750' }
    - { path: "/etc/patroni", owner: postgres, group: postgres, mode: '0750' }
    - { path: "/etc/keepalived", owner: root, group: root, mode: '0750' }
    - { path: "{{ citus_pg_state_root }}", owner: postgres, group: postgres, mode: '0750' }
    - { path: "{{ citus_pg_pgdata }}", owner: postgres, group: postgres, mode: '0700' }
    - { path: "{{ citus_pg_log_dir }}", owner: postgres, group: postgres, mode: '0750' }

# Patroni (run as postgres) needs to create/read the TLS leaf the Vault Agent
# (run as root) renders into {{ citus_pg_config_dir }}/tls. The tls dir is
# group postgres 0750 so the agent's 0640 root:postgres files are readable.

# ─── systemd units (DISABLED at bake) ─────────────────────────────────────
- name: Install nexus-patroni.service (DISABLED)
  ansible.builtin.template:
    src: nexus-patroni.service.j2
    dest: /etc/systemd/system/nexus-patroni.service
    owner: root
    group: root
    mode: '0644'
  notify: Reload systemd

- name: Install nexus-keepalived.service (DISABLED)
  ansible.builtin.template:
    src: nexus-keepalived.service.j2
    dest: /etc/systemd/system/nexus-keepalived.service
    owner: root
    group: root
    mode: '0644'
  notify: Reload systemd

- name: Ensure nexus-patroni + nexus-keepalived are disabled at bake
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: false
    daemon_reload: true
  loop:
    - nexus-patroni.service
    - nexus-keepalived.service

# ─── /usr/local/sbin/nexus-patronictl operator wrapper ────────────────────
# Pre-loads PATRONICTL_CONFIG_FILE so the operator can run `nexus-patronictl
# list` / `nexus-patronictl switchover` without typing -c every time.
- name: Install /usr/local/sbin/nexus-patronictl operator wrapper
  ansible.builtin.copy:
    dest: /usr/local/sbin/nexus-patronictl
    content: |
      #!/bin/bash
      # nexus-patronictl -- patronictl wrapper pre-loaded with the rendered config.
      set -e
      exec {{ citus_pg_patroni_venv }}/bin/patronictl -c /etc/patroni/patroni.yml "$@"
    owner: root
    group: root
    mode: '0755'

# ─── Verify ──────────────────────────────────────────────────────────────
# NB: postgres + patroni print --version to stdout; keepalived prints it to
# STDERR (empty stdout) -- so we only --version the first two here and confirm
# keepalived via stat (its --version is verified in the Packer post-install
# combined-output check). A stdout-only map('first') over keepalived tripped on
# the empty sequence. (0.P build transient #3.)
- name: Verify PostgreSQL + Patroni --version (stdout)
  ansible.builtin.command: "{{ item }} --version"
  changed_when: false
  loop:
    - "/usr/lib/postgresql/{{ citus_pg_pg_major }}/bin/postgres"
    - "{{ citus_pg_patroni_venv }}/bin/patroni"
  register: citus_pg_verify

- name: Verify keepalived binary is executable
  ansible.builtin.stat:
    path: /usr/sbin/keepalived
  register: citus_pg_keepalived
  failed_when: not (citus_pg_keepalived.stat.exists and citus_pg_keepalived.stat.executable)

- name: Show installed versions
  ansible.builtin.debug:
    msg: "{{ citus_pg_verify.results | map(attribute='stdout') | list }}"
