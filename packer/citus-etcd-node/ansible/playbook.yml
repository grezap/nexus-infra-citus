---
- name: Configure citus-etcd-node template (Phase 0.P)
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  vars:
    target_user: "{{ target_user | default('nexusadmin') }}"
    citus_etcd_version: "{{ citus_etcd_version | default('3.5.16') }}"

  roles:
    - nexus_identity
    - nexus_network
    - nexus_firewall
    - nexus_observability
    - citus_firstboot
    - citus_etcd
